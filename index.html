<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://admin.tago.io/dist/custom-widget.sdk.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .semaforo { background: #333; padding: 30px; border-radius: 30px; border: 4px solid #444; display: flex; flex-direction: column; gap: 20px; }
        .luz { width: 70px; height: 70px; border-radius: 50%; background: #111; transition: 0.3s; }
        .rojo.active { background: #ff0000; box-shadow: 0 0 30px #ff0000; }
        .amarillo.active { background: #ffcc00; box-shadow: 0 0 30px #ffcc00; }
        .verde.active { background: #00ff00; box-shadow: 0 0 30px #00ff00; }
    </style>
</head>
<body>
    <div class="semaforo">
        <div id="r" class="luz rojo"></div>
        <div id="a" class="luz amarillo"></div>
        <div id="v" class="luz verde"></div>
        <div id="txt" style="text-align:center; font-size: 1.5rem;">Esperando...</div>
    </div>

    <script>
        function update(val) {
            document.getElementById('txt').innerText = val + " cm";
            document.getElementById('r').classList.toggle('active', val < 10);
            document.getElementById('a').classList.toggle('active', val >= 10 && val <= 30);
            document.getElementById('v').classList.toggle('active', val > 30);
        }

        // Esta función se ejecuta cuando Tago envía CUALQUIER cosa
        window.TagoIO.onRealtime((data) => {
            if (!data || data.length === 0) return; // Si llega null o vacío, no hacer nada
            
            // Buscar la variable 'distancia' de forma segura
            const s = data.find(i => i && i.variable === 'distancia');
            if (s && s.value !== undefined) {
                update(parseFloat(s.value));
            }
        });

        window.TagoIO.ready();
    </script>
</body>
</html>
