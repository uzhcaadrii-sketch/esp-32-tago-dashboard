<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://admin.tago.io/dist/custom-widget.sdk.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #1a1a1a; color: white; }
        .box { border: 2px solid #00ff00; display: inline-block; padding: 20px; border-radius: 15px; margin-top: 100px; }
        #distancia { font-size: 50px; color: #00ff00; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Nivel del Sensor</h2>
        <div id="distancia">Cargando...</div>
        <p>centímetros</p>
    </div>

    <script>
        // Al iniciar el widget
        window.TagoIO.onStart((data) => {
            console.log("Conectado con TagoIO");
        });

        // Cuando llegan datos en tiempo real del ESP32
        window.TagoIO.onRealtime((data) => {
            const sensor = data.find(item => item.variable === 'distancia');
            if (sensor) {
                document.getElementById('distancia').innerText = sensor.value;
            }
        });
    </script>
</body>
</html>
